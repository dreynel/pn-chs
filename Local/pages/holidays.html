<style>
  .hol-page { height:100%; display:flex; flex-direction:column; overflow:hidden; }
  .hol-toolbar { display:flex; align-items:center; gap:10px; padding:12px 18px;
    background:var(--surface); border-bottom:1.5px solid var(--border); flex-shrink:0; flex-wrap:wrap; }
  .hol-title { font-family:'Playfair Display',serif; font-size:1.05rem; color:var(--navy); }
  .hol-sub   { font-size:10.5px; color:var(--muted2); margin-top:1px; }

  .btn { display:inline-flex; align-items:center; gap:5px; padding:7px 13px; border-radius:8px;
    font-size:12px; font-weight:600; cursor:pointer; border:1.5px solid transparent; transition:all .15s; }
  .btn-primary { background:var(--navy); color:#fff; }
  .btn-outline { background:var(--surface2); border-color:var(--border); color:var(--muted); }
  .btn-outline:hover { background:var(--navy-light); color:var(--navy-mid); }
  .btn-danger  { background:var(--red-dim); border-color:rgba(220,38,38,.3); color:var(--red); }

  .hol-body { flex:1; overflow-y:auto; padding:20px 24px; }

  /* Summary cards */
  .hol-cards { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
  .hol-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 16px; }
  .hol-card-lbl { font-size:10px; color:var(--muted2); text-transform:uppercase; margin-bottom:4px; }
  .hol-card-val { font-family:'Playfair Display',serif; font-size:1.3rem; color:var(--navy); }

  /* Year tabs */
  .year-tabs { display:flex; gap:4px; margin-bottom:16px; }
  .ytab { padding:5px 12px; border-radius:6px; font-size:11.5px; font-weight:600; cursor:pointer;
    background:var(--surface2); color:var(--muted); border:1px solid var(--border); transition:all .15s; }
  .ytab.active { background:var(--navy); color:#fff; border-color:var(--navy); }

  /* Table */
  table { width:100%; border-collapse:separate; border-spacing:0; }
  th { position:sticky; top:0; background:var(--bg); z-index:5; text-align:left;
    padding:10px 14px; font-size:10.5px; text-transform:uppercase; color:var(--muted2);
    border-bottom:1.5px solid var(--border); }
  td { padding:11px 14px; background:var(--surface); border-bottom:1px solid rgba(226,221,214,.4); font-size:12.5px; }

  .type-pill { font-size:9px; font-weight:700; padding:2px 8px; border-radius:4px; }
  .type-regular { background:#fef3c7; color:#92400e; }
  .type-special { background:#e0f2fe; color:#0284c7; }

  /* Modal */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); backdrop-filter:blur(2px);
    z-index:2000; display:none; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal-box { background:#fff; width:440px; border-radius:14px; overflow:hidden; box-shadow:0 20px 40px rgba(0,0,0,.2); }
  .modal-hdr { padding:18px 22px; border-bottom:1.5px solid var(--border);
    font-family:'Playfair Display',serif; font-size:1rem; color:var(--navy); }
  .modal-body { padding:20px 22px; display:flex; flex-direction:column; gap:12px; }
  .form-lbl { font-size:11px; color:var(--muted); margin-bottom:4px; display:block; }
  .form-inp { width:100%; padding:8px 10px; border:1.5px solid var(--border); border-radius:8px;
    font-size:12.5px; outline:none; background:var(--surface2); font-family:inherit; box-sizing:border-box; }
  .form-inp:focus { border-color:var(--navy-mid); }
  .modal-ftr { padding:12px 22px; border-top:1.5px solid var(--border); display:flex; justify-content:flex-end;
    gap:8px; background:var(--surface2); }
  .err-msg { font-size:11.5px; color:var(--red); background:var(--red-dim); padding:8px 12px;
    border-radius:7px; display:none; }
</style>

<div class="hol-page">
  <!-- Toolbar -->
  <div class="hol-toolbar">
    <div>
      <div class="hol-title">Holiday Calendar</div>
      <div class="hol-sub">Manage regular and special non-working holidays</div>
    </div>
    <div style="flex:1;"></div>
    <button class="btn btn-primary" id="btnAddHoliday">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
      </svg>
      Add Holiday
    </button>
  </div>

  <!-- Body -->
  <div class="hol-body">
    <!-- Summary cards -->
    <div class="hol-cards">
      <div class="hol-card">
        <div class="hol-card-lbl">Total Holidays</div>
        <div class="hol-card-val" id="cTotal">—</div>
      </div>
      <div class="hol-card">
        <div class="hol-card-lbl">Regular</div>
        <div class="hol-card-val" id="cRegular" style="color:#92400e;">—</div>
      </div>
      <div class="hol-card">
        <div class="hol-card-lbl">Special Non-Working</div>
        <div class="hol-card-val" id="cSpecial" style="color:#0284c7;">—</div>
      </div>
    </div>

    <!-- Year tabs -->
    <div class="year-tabs" id="yearTabs"></div>

    <!-- Table -->
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Holiday Name</th>
          <th>Type</th>
          <th style="width:60px;"></th>
        </tr>
      </thead>
      <tbody id="holBody">
        <tr><td colspan="4" style="text-align:center;color:var(--muted2);padding:24px;">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Add Holiday Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal-box">
    <div class="modal-hdr">Add Holiday</div>
    <div class="modal-body">
      <div>
        <label class="form-lbl">Date *</label>
        <input type="date" class="form-inp" id="mDate">
      </div>
      <div>
        <label class="form-lbl">Holiday Name *</label>
        <input type="text" class="form-inp" id="mName" placeholder="e.g. Independence Day">
      </div>
      <div>
        <label class="form-lbl">Type *</label>
        <select class="form-inp" id="mType">
          <option value="Regular">Regular Holiday (200% pay)</option>
          <option value="Special">Special Non-Working (130% pay)</option>
        </select>
      </div>
      <div class="err-msg" id="mErr"></div>
    </div>
    <div class="modal-ftr">
      <button class="btn btn-outline" id="btnCancelAdd">Cancel</button>
      <button class="btn btn-primary" id="btnSaveHoliday">Save Holiday</button>
    </div>
  </div>
</div>

<script>
(function() {
  const API = '/api/payroll/holidays';
  let holidays = [];
  let activeYear = new Date().getFullYear();

  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  async function loadHolidays() {
    try {
      holidays = await $.get(API + '?year=' + activeYear);
      renderCards();
      renderTable();
    } catch(e) { console.error(e); }
  }

  function buildYearTabs() {
    const cur = new Date().getFullYear();
    const $tabs = $('#yearTabs').empty();
    for (let y = cur - 1; y <= cur + 2; y++) {
      $tabs.append(`<div class="ytab${y===activeYear?' active':''}" data-y="${y}">${y}</div>`);
    }
    $tabs.find('.ytab').on('click', function() {
      activeYear = parseInt($(this).data('y'));
      $tabs.find('.ytab').removeClass('active');
      $(this).addClass('active');
      loadHolidays();
    });
  }

  function renderCards() {
    const reg = holidays.filter(h => h.type==='Regular').length;
    const spc = holidays.filter(h => h.type==='Special').length;
    $('#cTotal').text(holidays.length);
    $('#cRegular').text(reg);
    $('#cSpecial').text(spc);
  }

  function renderTable() {
    if (!holidays.length) {
      $('#holBody').html('<tr><td colspan="4" style="text-align:center;color:var(--muted2);padding:24px;">No holidays found for this year.</td></tr>');
      return;
    }
    $('#holBody').html(holidays.map(h => {
      const d = new Date(h.date + 'T00:00:00');
      const dayName = d.toLocaleDateString('en-PH', {weekday:'short'});
      const formatted = `${MONTHS[d.getMonth()]} ${String(d.getDate()).padStart(2,'0')}, ${d.getFullYear()} (${dayName})`;
      const pillClass = h.type === 'Regular' ? 'type-regular' : 'type-special';
      return `<tr>
        <td>${formatted}</td>
        <td><strong>${h.name}</strong></td>
        <td><span class="type-pill ${pillClass}">${h.type}</span></td>
        <td>
          <button class="btn btn-danger" style="padding:4px 9px;font-size:11px;" data-id="${h.id}" onclick="deleteHoliday(${h.id},'${h.name}')">
            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          </button>
        </td>
      </tr>`;
    }).join(''));
  }

  window.deleteHoliday = async function(id, name) {
    if (!confirm(`Delete "${name}" from the holiday calendar?`)) return;
    try {
      await fetch(API + '/' + id, {method:'DELETE'});
      loadHolidays();
    } catch(e) { alert('Error deleting holiday.'); }
  };

  // Add modal
  $('#btnAddHoliday').on('click', function() {
    $('#mDate').val(''); $('#mName').val(''); $('#mType').val('Regular'); $('#mErr').hide();
    $('#addModal').addClass('open');
  });
  $('#btnCancelAdd').on('click', () => $('#addModal').removeClass('open'));
  $('#addModal').on('click', function(e) { if(e.target===this) $(this).removeClass('open'); });

  $('#btnSaveHoliday').on('click', async function() {
    const date = $('#mDate').val();
    const name = $('#mName').val().trim();
    const type = $('#mType').val();
    if (!date || !name) { $('#mErr').text('Date and name are required.').show(); return; }
    $('#mErr').hide();
    $(this).prop('disabled', true).text('Saving…');
    try {
      const res = await fetch(API, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({date, name, type})
      });
      const d = await res.json();
      if (d.error) { $('#mErr').text(d.error).show(); }
      else { $('#addModal').removeClass('open'); loadHolidays(); }
    } catch(e) { $('#mErr').text('Failed to save.').show(); }
    $(this).prop('disabled', false).text('Save Holiday');
  });

  buildYearTabs();
  loadHolidays();
})();
</script>
