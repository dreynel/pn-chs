<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cloud Unreachable</title>
  <style>
    :root {
      --bg: #f8fafc;
      --navy: #1e3a5f;
      --red: #e74c3c;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--navy);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .icon {
      color: var(--red);
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin: 0 0 10px;
    }
    p {
      color: #64748b;
      max-width: 400px;
      line-height: 1.6;
    }
    .loader {
      margin-top: 30px;
      width: 24px;
      height: 24px;
      border: 3px solid #cbd5e1;
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <svg class="icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/>
    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01"/>
  </svg>
  <h1>Cloud Unreachable</h1>
  <p>The local system cannot access the live rendering cloud. Operations are temporarily restricted until the connection is restored.</p>
  <div class="loader"></div>
  <p style="font-size: 11px; margin-top: 15px;">Automatically retrying...</p>
  
  <script>
    setInterval(() => {
      window.location.reload();
    }, 10000); // refresh every 10 seconds to check if back online
  </script>
</body>
</html>
