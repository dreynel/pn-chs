<style>
  /* ══════════════════════════════════════
     BIOMETRIC LOGS STYLES
  ══════════════════════════════════════ */
  .bl-page {
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    background: var(--bg);
  }

  /* Toolbar */
  .bl-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 22px; background: var(--surface);
    border-bottom: 1.5px solid var(--border); flex-shrink: 0;
  }
  .bl-toolbar-title { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: var(--navy); }
  .bl-toolbar-sub { font-size: 11px; color: var(--muted2); margin-top: 2px; }

  /* Body */
  .bl-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 22px; }
  
  .bl-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(30,58,95,0.03);
  }

  .bl-card-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 20px;
    border-bottom: 1.5px solid var(--border);
    background: var(--surface2);
    gap: 12px;
  }

  .bl-search-box { position: relative; display: flex; align-items: center; width: 260px; }
  .bl-search-box svg { position: absolute; left: 12px; width: 14px; height: 14px; color: var(--muted2); pointer-events: none; }
  .bl-search-box input { width: 100%; padding: 8px 12px 8px 34px; border-radius: 9px; border: 1.5px solid var(--border); background: var(--surface); font-size: 12px; outline: none; transition: border-color 0.15s, box-shadow 0.15s; color: var(--text); }
  .bl-search-box input:focus { border-color: var(--navy-mid); box-shadow: 0 0 0 3px rgba(42,79,128,0.1); }
  .bl-search-box input::placeholder { color: var(--muted2); }

  .bl-date-filter { display: flex; align-items: center; }
  .bl-date-filter input { padding: 7px 12px; border-radius: 9px; border: 1.5px solid var(--border); background: var(--surface); font-size: 12px; outline: none; transition: border-color 0.15s; color: var(--text); font-family: inherit; cursor: pointer; }
  .bl-date-filter input:focus { border-color: var(--navy-mid); }

  /* Table */
  .list-container { flex: 1; overflow-y: auto; padding: 0; }
  .list-container::-webkit-scrollbar { width: 4px; }
  .list-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  table { width: 100%; border-collapse: separate; border-spacing: 0; }
  th { position: sticky; top: 0; background: var(--surface2); z-index: 5; text-align: left; padding: 12px 20px; font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted2); border-bottom: 1.5px solid var(--border); font-weight: 700; }
  td { padding: 14px 20px; background: var(--surface); border-bottom: 1px solid rgba(226,221,214,0.4); font-size: 13px; color: var(--text); }
  tr:hover td { background: #fafaf8; }
  tr:last-child td { border-bottom: none; }

  /* Badges */
  .log-badge {
    display: inline-flex; align-items: center;
    padding: 4px 10px; border-radius: 6px;
    font-size: 10.5px; font-weight: 600;
    font-family: inherit; letter-spacing: .02em;
  }
  .log-badge.in { background: #ecfdf5; color: #10b981; border: 1px solid #a7f3d0; }
  .log-badge.out { background: #fffbeb; color: #d97706; border: 1px solid #fde68a; }

  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid transparent; transition: all 0.15s; font-family: inherit; }
  .btn-outline { background: var(--surface); border-color: var(--border); color: var(--muted); }
  .btn-outline:hover { background: var(--navy-light); color: var(--navy-mid); border-color: #c5d8f5; }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--muted2); }
  .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5; }
  .empty-state-title { font-weight: 600; color: var(--navy); font-size: 14px; margin-bottom: 4px; }
  .empty-state-sub { font-size: 12px; }

</style>

<div class="bl-page">
  <!-- Toolbar -->
  <div class="bl-toolbar">
    <div class="bl-info">
      <div class="bl-toolbar-title">Biometric Logs</div>
      <div class="bl-toolbar-sub">Raw terminal punch data from the hardware scanner</div>
    </div>
    <div style="flex:1;"></div>
    <button class="btn btn-outline" id="btnRefreshLogs" onclick="loadBiometricLogs()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
      </svg>
      Refresh
    </button>
  </div>

  <div class="bl-body">
    <div class="bl-card">
      <div class="bl-card-header">
        <div style="display:flex; align-items:center; gap:12px;">
          <div class="bl-date-filter">
            <input type="date" id="logDateFilter" title="Filter by date">
          </div>
          <div class="bl-search-box">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" id="logSearchInput" placeholder="Search by name or ID...">
          </div>
        </div>
      </div>
      
      <div class="list-container">
        <table>
          <thead>
            <tr>
              <th style="width: 70px;">Scan #</th>
              <th>Employee Info</th>
              <th>Punch Type</th>
              <th>Timestamp</th>
            </tr>
          </thead>
          <tbody id="bioLogsTbody">
            <tr>
              <td colspan="4">
                <div class="empty-state">
                  <div class="spinner-border spinner-border-sm" role="status" style="width: 20px; height: 20px; border-width: 2px;"></div>
                  <div class="empty-state-title" style="margin-top:10px;">Loading Logs</div>
                  <div class="empty-state-sub">Fetching raw logs from the database...</div>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script>
  let rawLogs = [];

  function renderBiometricLogs(query = '') {
    const tbody = $('#bioLogsTbody');
    const filtered = query ? rawLogs.filter(log => 
      log.name.toLowerCase().includes(query.toLowerCase()) || 
      log.employee_id.toLowerCase().includes(query.toLowerCase()) ||
      log.log_type_label.toLowerCase().includes(query.toLowerCase())
    ) : rawLogs;

    if (filtered.length === 0) {
      tbody.html(`
        <tr>
          <td colspan="4">
            <div class="empty-state">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
              <div class="empty-state-title">No matching records found</div>
              <div class="empty-state-sub">Adjust your search or clear the filter.</div>
            </div>
          </td>
        </tr>
      `);
      return;
    }

    const html = filtered.map(log => {
      let badgeClass = 'log-badge ';
      if (log.log_type.includes('in')) badgeClass += 'in';
      if (log.log_type.includes('out')) badgeClass += 'out';
      
      return `
        <tr>
          <td><span style="color:var(--muted2); font-size:11.5px; font-weight:600;">#${log.id}</span></td>
          <td>
            <div style="font-weight:600; color:var(--navy); font-size:13px;">${log.name}</div>
            <div style="color:var(--muted2); font-size:10.5px; margin-top:2px;">${log.employee_id}</div>
          </td>
          <td><span class="${badgeClass}">${log.log_type_label}</span></td>
          <td><span style="font-variant-numeric: tabular-nums; color:var(--text); font-size:12.5px;">${log.log_time}</span></td>
        </tr>
      `;
    }).join('');

    tbody.html(html);
  }

  function loadBiometricLogs() {
    const dFilter = $('#logDateFilter').val();
    const url = dFilter ? '/api/attendance/logs/data?date=' + dFilter : '/api/attendance/logs/data';
    
    const tbody = $('#bioLogsTbody');
    tbody.html(`
      <tr>
        <td colspan="4">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="me-2" style="animation: spin 1s linear infinite;"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            <div class="empty-state-title" style="margin-top:10px;">Refreshing...</div>
          </div>
        </td>
      </tr>
    `);
    
    $.get(url, function(res) {
      if (res.error) {
        Swal.fire({ icon: 'error', title: 'Error', text: res.error });
        tbody.html('<tr><td colspan="4"><div class="empty-state">Failed to load logs.</div></td></tr>');
        return;
      }
      
      rawLogs = res;
      renderBiometricLogs($('#logSearchInput').val());
      
    }).fail(function() {
      Swal.fire({ icon: 'error', title: 'Connection Error', text: 'Could not connect to the API to fetch biometric logs.' });
      tbody.html(`
        <tr>
          <td colspan="4">
            <div class="empty-state" style="color:var(--red);">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              <div class="empty-state-title" style="color:var(--red);">Server Error</div>
              <div class="empty-state-sub">Could not connect to the API.</div>
            </div>
          </td>
        </tr>
      `);
    });
  }

  // Bind change on date picker
  $(document).off('change', '#logDateFilter').on('change', '#logDateFilter', function() {
    loadBiometricLogs();
  });

  // Bind search input
  $(document).off('input', '#logSearchInput').on('input', '#logSearchInput', function() {
    renderBiometricLogs($(this).val());
  });

  // Init - Default to today's date in local timezone
  (function() {
    const today = new Date();
    const y = today.getFullYear();
    const m = String(today.getMonth() + 1).padStart(2, '0');
    const d = String(today.getDate()).padStart(2, '0');
    $('#logDateFilter').val(`${y}-${m}-${d}`);
  })();
  loadBiometricLogs();
</script>
