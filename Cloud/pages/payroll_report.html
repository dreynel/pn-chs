<style>
  .rep-page {
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }
  .rep-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; background: var(--surface);
    border-bottom: 1.5px solid var(--border); flex-shrink: 0;
  }
  .rep-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; color: var(--navy); }
  .rep-sub { font-size: 11px; color: var(--muted2); margin-top: 2px; }

  .rep-body { flex: 1; overflow-y: auto; padding: 24px; position: relative; }

  .rep-controls {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex; gap: 16px; align-items: flex-end;flex-wrap: wrap;
  }
  
  .ctrl-group { display: flex; flex-direction: column; gap: 6px; }
  .ctrl-group label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .ctrl-group select {
    padding: 9px 12px; border-radius: 8px; border: 1.5px solid var(--border);
    background: var(--surface2); font-size: 13px; color: var(--navy); outline: none; min-width: 140px; cursor: pointer;
  }
  .ctrl-group select:focus { border-color: var(--navy-mid); }

  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1.5px solid transparent; transition: all 0.2s; white-space: nowrap; }
  .btn-primary { background: var(--navy); color: #fff; box-shadow: 0 4px 10px rgba(30, 58, 95, 0.2); }
  .btn-primary:hover { background: var(--navy-mid); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; pointer-events: none; }
  .btn-outline { background: var(--surface); border-color: var(--border); color: var(--muted); }
  .btn-outline:hover { background: var(--navy-light); color: var(--navy-mid); border-color: var(--navy-mid); }

  /* Table */
  .table-card { background: var(--surface); border-radius: 12px; border: 1.5px solid var(--border); overflow-x: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.02); margin-top: 10px;}
  table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 1200px; }
  th { background: var(--surface2); text-align: left; padding: 12px 14px; font-size: 10.5px; font-weight: 700; text-transform: uppercase; color: var(--muted2); border-bottom: 1.5px solid var(--border); letter-spacing: 0.5px; position: sticky; top: 0; z-index: 5; }
  td { padding: 12px 14px; background: var(--surface); border-bottom: 1px solid rgba(226,221,214,0.3); font-size: 12.5px; color: var(--navy); white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  
  .num { font-variant-numeric: tabular-nums; text-align: right; }
  .center { text-align: center; }
  .amt-earn { color: #059669; font-weight: 600; }
  .amt-deduct { color: #dc2626; font-weight: 600; }
  .amt-net { font-weight: 700; color: var(--navy); }

  .print-only { display: none; }

  @media print {
    body * { visibility: hidden; }
    .print-only { display: block; visibility: visible; }
    #printableArea, #printableArea * { visibility: visible; }
    #printableArea { position: absolute; left: 0; top: 0; width: 100%; }
    .rep-controls, .btn { display: none !important; }
    .table-card { box-shadow: none; border: none; overflow: visible; }
    table { width: 100%; min-width: 100%; border: 1px solid #000; border-collapse: collapse; }
    th, td { border: 1px solid #ccc; padding: 6px; font-size: 10px !important; }
    td { white-space: normal; }
  }

  .loading-msg { padding: 40px; text-align: center; color: var(--muted2); font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .spinner { width: 24px; height: 24px; border: 2.5px solid var(--border); border-top-color: var(--navy-mid); border-radius: 50%; animation: spin 0.7s linear infinite; }
</style>

<div class="rep-page">
  <div class="rep-toolbar">
    <div>
      <div class="rep-title">Payroll Report Viewer</div>
      <div class="rep-sub">Export or print processed payroll records</div>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline" id="btnExportCSV" disabled>
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="15" height="15"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
        Export CSV
      </button>
      <button class="btn btn-primary" id="btnPrintReport" disabled>
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="15" height="15"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
        Print
      </button>
    </div>
  </div>

  <div class="rep-body" id="repBody">
    <div class="rep-controls">
      <div class="ctrl-group">
        <label>Select Payroll Run</label>
        <select id="selRun">
          <option value="">Loading runs...</option>
        </select>
      </div>
      <button class="btn btn-primary" id="btnLoadReport" style="margin-bottom: 2px;">Generate View</button>
    </div>

    <div id="printableArea">
      <div id="reportContent">
        <div class="loading-msg">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="40" height="40" style="color:var(--border);"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
          Select a payroll run from the dropdown above to view the report.
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  const fCurrency = num => '₱' + Number(num).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  
  let currentRuns = [];
  let currentReportData = null;

  function loadRuns() {
    $.get('/api/payroll/runs', function(data) {
      currentRuns = data.filter(r => r.status === 'Approved' || r.status === 'Posted');
      const $sel = $('#selRun');
      $sel.empty();
      if (currentRuns.length === 0) {
        $sel.append('<option value="">No Approved Payrolls Found</option>');
      } else {
        currentRuns.forEach(r => {
          $sel.append(`<option value="${r.year}|${r.month}|${r.half}">${r.period} (Approved ${r.approved_at || r.created_at})</option>`);
        });
      }
    });
  }

  function renderReport(data) {
    if (!data || !data.employees || data.employees.length === 0) {
      $('#reportContent').html('<div class="loading-msg">No data found in this payroll run.</div>');
      return;
    }

    let html = `
      <div class="print-only" style="margin-bottom: 20px; text-align: center;">
        <h2 style="font-family:'Playfair Display',serif; margin:0;">PayCore Payroll Report</h2>
        <div style="font-size:12px; color:#555;">Period: ${data.period}</div>
        <div style="font-size:11px; color:#777; margin-top:4px;">Generated on: ${new Date().toLocaleString()} | Approved by: ${data.approved_by || 'Unknown'}</div>
      </div>
      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Employee Name</th>
              <th>Designation</th>
              <th class="num">Gross Pay</th>
              <th class="num">Net Pay</th>
              <th class="num">Basic Salary</th>
              <th class="num">Earnings</th>
              <th class="num">Absences</th>
              <th class="num">Tardy/UT</th>
              <th class="num">GSIS/SSS</th>
              <th class="num">PhilHealth</th>
              <th class="num">Pag-IBIG</th>
              <th class="num">W/Tax</th>
              <th class="num">Total Deductions</th>
            </tr>
          </thead>
          <tbody>
    `;

    data.employees.forEach(e => {
      const tardyUt = (e.tardiness_deduction || 0) + (e.undertime_deduction || 0);
      html += `
        <tr>
          <td style="font-weight:600;">${e.name}</td>
          <td>${e.designation}</td>
          <td class="num amt-earn">${fCurrency(e.total_gross)}</td>
          <td class="num amt-net">${fCurrency(e.net_pay)}</td>
          <td class="num">${fCurrency(e.half_basic || 0)}</td>
          <td class="num">${fCurrency(e.other_earnings || 0)}</td>
          <td class="num" style="color:var(--red)">${e.absent_deduction > 0 ? '-' + fCurrency(e.absent_deduction) : '—'}</td>
          <td class="num" style="color:var(--red)">${tardyUt > 0 ? '-' + fCurrency(tardyUt) : '—'}</td>
          <td class="num">${e.gsis_ee > 0 ? '-' + fCurrency(e.gsis_ee) : '—'}</td>
          <td class="num">${e.philhealth_ee > 0 ? '-' + fCurrency(e.philhealth_ee) : '—'}</td>
          <td class="num">${e.pagibig_ee > 0 ? '-' + fCurrency(e.pagibig_ee) : '—'}</td>
          <td class="num">${e.withholding_tax > 0 ? '-' + fCurrency(e.withholding_tax) : '—'}</td>
          <td class="num amt-deduct">-${fCurrency(e.total_deduct)}</td>
        </tr>
      `;
    });

    html += `
          </tbody>
          <tfoot>
            <tr style="background: var(--navy-light);">
              <td colspan="2" style="font-weight:700; text-align:right;">GRAND TOTAL</td>
              <td class="num amt-earn" style="font-weight:700;">${fCurrency(data.summary.grand_total_gross)}</td>
              <td class="num amt-net" style="font-weight:700; font-size:14px;">${fCurrency(data.summary.grand_total_net)}</td>
              <td colspan="8"></td>
              <td class="num amt-deduct" style="font-weight:700;">-${fCurrency(data.summary.grand_total_deduct)}</td>
            </tr>
          </tfoot>
        </table>
      </div>
    `;

    $('#reportContent').html(html);
  }

  function downloadCSV(data) {
    if (!data || !data.employees) return;
    
    let csv = 'Employee Name,Designation,Basic Salary,Other Earnings,Gross Pay,Absent Deduction,Tardy/Undertime Deduction,GSIS/SSS,PhilHealth,Pag-IBIG,Withholding Tax,Total Deductions,Net Pay\n';
    
    data.employees.forEach(e => {
      const tardyUt = (e.tardiness_deduction || 0) + (e.undertime_deduction || 0);
      csv += `"${e.name}","${e.designation}",${e.half_basic || 0},${e.other_earnings || 0},${e.total_gross},${e.absent_deduction || 0},${tardyUt},${e.gsis_ee || 0},${e.philhealth_ee || 0},${e.pagibig_ee || 0},${e.withholding_tax || 0},${e.total_deduct},${e.net_pay}\n`;
    });

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    const url = URL.createObjectURL(blob);
    link.setAttribute("href", url);
    link.setAttribute("download", `Payroll_Report_${data.period.replace(/ /g, '_')}.csv`);
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }

  // Bindings using delegation
  $(document).off('click', '#btnLoadReport').on('click', '#btnLoadReport', function() {
    const val = $('#selRun').val();
    if (!val) return;
    const [year, month, half] = val.split('|');
    
    $('#reportContent').html('<div class="loading-msg"><div class="spinner"></div>Loading comprehensive breakdown...</div>');
    $('#btnExportCSV, #btnPrintReport').prop('disabled', true);

    $.get('/api/payroll/process', { year, month, half }, function(res) {
      currentReportData = res;
      renderReport(res);
      $('#btnExportCSV, #btnPrintReport').prop('disabled', false);
    }).fail(function(xhr) {
      $('#reportContent').html(`<div class="loading-msg"><span style="color:var(--red)">Failed to load data: ${(xhr.responseJSON && xhr.responseJSON.error) || 'Server error'}</span></div>`);
    });
  });

  $(document).off('click', '#btnExportCSV').on('click', '#btnExportCSV', function() {
    downloadCSV(currentReportData);
  });

  $(document).off('click', '#btnPrintReport').on('click', '#btnPrintReport', function() {
    window.print();
  });

  // Init
  loadRuns();
})();
</script>
